services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: shakiba
      POSTGRES_PASSWORD: password
      POSTGRES_DB: llm_debate_system
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql://shakiba:password@db/llm_debate_system
    depends_on:
      - db

volumes:
  postgres_data: